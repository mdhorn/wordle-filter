name: Update Wordle used-answer list

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node scripts/update-wordle-list.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update used Wordle answer list
